<!-- Media Library Template for Soundmaster Admin Dashboard -->
<div class="container-fluid px-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mt-4">Media Library</h1>
    <div class="d-flex gap-2">
      <button id="selection-mode-toggle" class="btn btn-outline-primary">
        <i class="bi bi-check2-square"></i> Select Media
      </button>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#upload-modal">
        <i class="bi bi-cloud-upload"></i> Upload Media
      </button>
    </div>
  </div>
  
  <!-- Alert Container -->
  <div id="media-alert"></div>
  
  <!-- Selection Controls -->
  <div id="selection-controls" class="mb-3 p-3 bg-light rounded" style="display: none;">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <span class="me-2"><strong><span id="selected-count">0</span> items selected</strong></span>
        <button id="select-all-media" class="btn btn-sm btn-outline-secondary me-2">Select All</button>
        <button id="clear-selection" class="btn btn-sm btn-outline-secondary">Clear</button>
      </div>
      <button id="delete-selected" class="btn btn-sm btn-danger" disabled>
        <i class="bi bi-trash"></i> Delete Selected
      </button>
    </div>
  </div>
  
  <!-- Filter and Search -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label for="media-type-filter" class="form-label">Media Type</label>
          <select id="media-type-filter" class="form-select">
            <option value="all">All Media</option>
            <option value="image">Images</option>
            <option value="audio">Audio</option>
            <option value="video">Video</option>
            <option value="document">Documents</option>
          </select>
        </div>
        <div class="col-md-8">
          <label for="media-search" class="form-label">Search</label>
          <input type="text" id="media-search" class="form-control" placeholder="Search by filename or description...">
        </div>
      </div>
    </div>
  </div>
  
  <!-- Media Grid -->
  <div class="card mb-4">
    <div class="card-header">
      <i class="bi bi-images"></i> Media Files
    </div>
    <div class="card-body">
      <!-- Loading Indicator -->
      <div id="media-loading" class="d-flex justify-content-center p-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      
      <!-- Media Grid -->
      <div id="media-grid" class="media-grid" style="display: none;">
        <!-- Media items will be loaded here -->
      </div>
      
      <!-- Pagination -->
      <div id="media-pagination" class="d-flex justify-content-between align-items-center mt-4" style="display: none;">
        <button id="media-prev-page" class="btn btn-outline-primary" disabled>
          <i class="bi bi-chevron-left"></i> Previous
        </button>
        <span id="media-page-info">Page 1 of 1</span>
        <button id="media-next-page" class="btn btn-outline-primary" disabled>
          Next <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal fade" id="upload-modal" tabindex="-1" aria-labelledby="upload-modal-label" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="upload-modal-label">Upload Media</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="upload-alert"></div>
        
        <form id="media-upload-form">
          <div class="mb-3">
            <label for="media-file" class="form-label">File</label>
            <input type="file" class="form-control" id="media-file" required>
            <div id="file-preview" class="mt-2"></div>
          </div>
          
          <div class="mb-3">
            <label for="upload-title" class="form-label">Title</label>
            <input type="text" class="form-control" id="upload-title">
          </div>
          
          <div class="mb-3">
            <label for="upload-description" class="form-label">Description</label>
            <textarea class="form-control" id="upload-description" rows="2"></textarea>
          </div>
          
          <div class="mb-3">
            <label for="upload-alt-text" class="form-label">Alt Text (for images)</label>
            <input type="text" class="form-control" id="upload-alt-text">
          </div>
          
          <div class="mb-3">
            <label for="upload-type" class="form-label">Media Type</label>
            <select class="form-select" id="upload-type">
              <option value="image">Image</option>
              <option value="audio">Audio</option>
              <option value="video">Video</option>
              <option value="document">Document</option>
            </select>
          </div>
        </form>
        
        <div id="upload-loading" class="d-flex justify-content-center mt-3" style="display: none;">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" form="media-upload-form" class="btn btn-primary" id="upload-btn">Upload</button>
      </div>
    </div>
  </div>
</div>

<!-- Media Details Modal -->
<div class="modal fade" id="media-details-modal" tabindex="-1" aria-labelledby="media-details-modal-label" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="media-details-modal-label">Media Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-md-7">
            <div id="media-preview" class="mb-3"></div>
          </div>
          <div class="col-md-5">
            <ul class="list-group mb-3" id="media-details-list">
              <!-- Media details will be loaded here -->
            </ul>
            
            <form id="media-metadata-form">
              <input type="hidden" id="media-id">
              
              <div class="mb-3">
                <label for="media-title" class="form-label">Title</label>
                <input type="text" class="form-control" id="media-title">
              </div>
              
              <div class="mb-3">
                <label for="media-description" class="form-label">Description</label>
                <textarea class="form-control" id="media-description" rows="2"></textarea>
              </div>
              
              <div class="mb-3">
                <label for="media-alt-text" class="form-label">Alt Text</label>
                <input type="text" class="form-control" id="media-alt-text">
                <div class="form-text">Alternative text for screen readers (for images)</div>
              </div>
              
              <button type="submit" class="btn btn-primary">Update Metadata</button>
            </form>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal fade" id="confirm-delete-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirm Delete</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete <strong><span id="delete-count">0</span> media items</strong>?</p>
        <p class="text-danger">This action cannot be undone.</p>
        
        <div id="delete-loading" class="d-flex justify-content-center mt-3" style="display: none;">
          <div class="spinner-border text-danger" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirm-delete-media">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Media Library Modal (for integrations) -->
<div class="modal fade" id="media-library-modal" tabindex="-1" aria-labelledby="media-library-modal-label" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="media-library-modal-label">Select Media</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="media-library-container">
          <!-- Media library content will be loaded here -->
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<style>
  .media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1rem;
  }
  
  .media-item {
    border-radius: 0.5rem;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: all 0.2s ease;
    border: 2px solid transparent;
  }
  
  .media-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  }
  
  .media-item.selected {
    border-color: var(--bs-primary);
  }
  
  .media-item-inner {
    background-color: #f8f9fa;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  
  .media-thumbnail {
    position: relative;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #e9ecef;
    overflow: hidden;
  }
  
  .media-thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .media-icon {
    font-size: 2rem;
    color: #6c757d;
  }
  
  .media-select {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    z-index: 1;
  }
  
  .media-info {
    padding: 0.5rem;
  }
  
  .media-filename {
    font-size: 0.875rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .media-meta {
    font-size: 0.75rem;
    color: #6c757d;
  }
</style>
