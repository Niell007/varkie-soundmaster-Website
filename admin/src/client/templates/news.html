<!-- News Management Section -->
<div class="content-section">
  <div class="section-header">
    <h2><i class="fas fa-newspaper"></i> News Management</h2>
    <p>Create and manage news articles for your radio station</p>
  </div>

  <div class="section-actions">
    <button id="new-news-btn" class="btn btn-primary">
      <i class="fas fa-plus"></i> Create News Article
    </button>
  </div>

  <div class="section-content">
    <div id="news-container" class="mt-4">
      <!-- News items will be rendered here -->
    </div>
  </div>

  <!-- News Modal -->
  <div class="modal fade" id="news-modal" tabindex="-1" aria-labelledby="newsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="newsModalLabel">Create News Article</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="close-news-modal"></button>
        </div>
        <div class="modal-body">
          <form id="news-form">
            <div class="mb-3">
              <label for="news-title" class="form-label">Title</label>
              <input type="text" class="form-control" id="news-title" required>
            </div>
            <div class="mb-3">
              <label for="news-content" class="form-label">Content</label>
              <textarea class="form-control" id="news-content" rows="10" required></textarea>
              <small class="form-text text-muted">HTML formatting is supported</small>
            </div>
            <div class="mb-3">
              <label for="news-summary" class="form-label">Summary (Optional)</label>
              <textarea class="form-control" id="news-summary" rows="3"></textarea>
              <small class="form-text text-muted">If left empty, a summary will be automatically generated from the content</small>
            </div>
            <div class="mb-3">
              <label for="news-image" class="form-label">Featured Image (Optional)</label>
              <div class="input-group">
                <input type="text" class="form-control" id="news-image" placeholder="Image URL or media ID" hidden>
                <div id="image-picker-container" class="w-100"></div>
              </div>
              <div id="image-preview-container" class="mt-2">
                <!-- Image preview will be shown here -->
              </div>
              <small class="form-text text-muted">Select an image from your media library</small>
            </div>
            <div class="mb-3">
              <label for="news-publish-date" class="form-label">Publish Date</label>
              <input type="date" class="form-control" id="news-publish-date" required>
            </div>
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="news-featured">
              <label class="form-check-label" for="news-featured">
                Featured Article
              </label>
              <small class="form-text text-muted d-block">Featured articles appear prominently on the website</small>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" form="news-form" id="save-news">Save Article</button>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* News Manager Styles */
  .empty-state {
    text-align: center;
    padding: 40px;
    background-color: #f8f9fa;
    border-radius: var(--border-radius);
    margin-bottom: 20px;
  }
  
  .news-preview {
    background: white;
    border-radius: var(--border-radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-top: 20px;
  }
  
  .preview-title {
    font-size: 1.2rem;
    font-weight: 500;
    margin-bottom: 10px;
  }
  
  .preview-content {
    max-height: 400px;
    overflow-y: auto;
    padding: 15px;
    border: 1px solid #eee;
    border-radius: var(--border-radius);
    background-color: #f8f9fa;
  }
</style>
